<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Admin Panel</h2>

<input type="text" id="scheme" placeholder="Enter Scheme">
<button onclick="addScheme()">Add Scheme</button>

<ul id="list"></ul>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Firebase Config -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCo7ovs4z24O65EAWijE5rIP1roTjh9el",   // 🔥 apna real key daalo
  authDomain: "dipak-portal.firebaseapp.com",
  projectId: "dipak-portal",
  storageBucket: "dipak-portal.appspot.com",
  messagingSenderId: "395089848028",
  appId: "1:395089848028:web:fe3267620c3bfabfae7619"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
// ADD DATA
function addScheme() {
  const value = document.getElementById("scheme").value;

  db.collection("schemes").add({
    name: value
  });

  document.getElementById("scheme").value = "";
}

// SHOW DATA
db.collection("schemes").onSnapshot(snapshot => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const li = document.createElement("li");
    li.innerText = doc.data().name;

    const btn = document.createElement("button");
    btn.innerText = "Delete";

    btn.onclick = () => {
      db.collection("schemes").doc(doc.id).delete();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });
});
</script>

</body>
</html>
