<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h1>Admin Panel</h1>

<input type="text" id="scheme" placeholder="Enter Scheme">
<button onclick="addScheme()">Add Scheme</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC0ovsy4z24065EAWijE5rIP1roTjh9eLE",
  authDomain: "dipak-portal.firebaseapp.com",
  projectId: "dipak-portal"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addScheme() {
  const value = document.getElementById("scheme").value;

  db.collection("schemes").add({
    name: value
  });

  alert("Added!");
}
</script>

</body>
</html>
