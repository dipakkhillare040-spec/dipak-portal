<!DOCTYPE html>
<html>
<head>
<title>DipakMultiservices</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>DipakMultiservices</h1>
<a href="login.html">Login</a>

<h2>Latest Schemes</h2>
<ul id="scheme-list"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>

<script>
const db = firebase.firestore();

db.collection("schemes").onSnapshot(snapshot => {
  const list = document.getElementById("scheme-list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const li = document.createElement("li");
    li.innerText = doc.data().name;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
